name: Deploy Vault

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/htdocs/vault.jaimecj.com

            # Pull latest code
            git pull origin main

            # Install dependencies and build
            npm ci
            npm run build

            # Delete old process if exists
            npx pm2 delete vault || true

            # Start Next.js on port 3010
            PORT=3010 npx pm2 start npm --name "vault" -- run start

            # Save process list for auto-boot on VPS restart
            npx pm2 save

            echo "✅ Vault deployed successfully!"